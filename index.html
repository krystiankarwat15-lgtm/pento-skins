<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow: hidden;

    background: linear-gradient(-45deg, #ff758c, #ff7eb3, #fad0c4, #ff9a9e);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1 {
    margin-top: 20vh;
    font-size: 7vw;
    padding: 0 10px;
}

.buttons {
    margin-top: 40px;
}

button {
    padding: 18px 30px;
    font-size: 20px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
    width: 140px;
}

#yes {
    background-color: #4CAF50;
    color: white;
}

#no {
    background-color: #ff4d6d;
    color: white;
}

button:active {
    transform: scale(0.95);
}

.heart {
    position: absolute;
    color: white;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

.result {
    margin-top: 15vh;
}

.result h1 {
    font-size: 20vw;
    margin: 0;
}

.result img {
    margin-top: 20px;
    width: 70%;
    max-width: 300px;
    border-radius: 20px;
}
</style>
</head>

<body>

<h1 id="question">Malwina, czy zostaniesz moją dziewczyną? ❤️</h1>

<div class="buttons">
    <button id="yes" onclick="yesClick()">TAK ❤️</button>
    <button id="no" onclick="noClick()">NIE 😢</button>
</div>

<script>
const noTexts = [
    "No weź 🥺",
    "Proszę 😭",
    "Nie łam mi serca 💔",
    "Daj szansę 🙏",
    "Obiecuję być fajny 😎",
    "Jeszcze raz przemyśl ❤️",
    "Nooo Malwina 😢",
    "Będzie fajnie 🥰",
    "Zaryzykuj 😏",
    "Nie pożałujesz 💖",
    "Serio pytam 🥺",
    "No proszęeee 😭",
    "Daj mi jedną szansę ❤️",
    "Zmienisz zdanie 😏",
    "To tylko kliknięcie 😄"
];

let index = 0;

function yesClick() {
    document.body.innerHTML = `
        <div class="result">
            <h1>❤️🥰</h1>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExamhwN3dzZnIwcWNqYWU0aTNidTA3cjJsdDdqd2lmM2dhb2N4cWxtdCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/wvYNSqBAMDVx8CEYkt/giphy.gif">
        </div>
    `;
}

function noClick() {
    document.getElementById("question").innerText = noTexts[index];
    index = (index + 1) % noTexts.length;
}

// serduszka
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 250);
</script>

</body>
</html>
